<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WhatsApp API</title>
<link rel="stylesheet" href="/nord.css">
<link rel="stylesheet" href="/whatsapp.css">
</head>
<body>

<div class="app-header">
  <div class="dot" id="statusDot"></div>
  <h1>WhatsApp API</h1>
  <select class="session-select" id="sessionSelect" onchange="switchSession()"></select>
  <label class="toggle-label" style="margin:0;display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--text-muted)">
    <input type="checkbox" id="sidebarToggle" onchange="toggleSidebar()"> Logi
  </label>
</div>

<div class="layout-wrap">
<div class="container">
  <!-- Send message -->
  <div class="card">
    <div class="card-title">Wyslij wiadomosc</div>
    <div class="card-body">
      <div class="row" style="margin-bottom:12px">
        <div>
          <label for="phone">Odbiorca</label>
          <input type="text" id="phone" placeholder="+48 500 600 700 lub ID grupy">
        </div>
        <div style="flex:2">
          <label for="msg">Tresc</label>
          <textarea id="msg" placeholder="Wpisz wiadomosc..."></textarea>
        </div>
      </div>
      <button class="btn btn-green" id="sendBtn" onclick="sendMessage()">Wyslij</button>
      <div class="status-msg" id="sendStatus"></div>
    </div>
  </div>

  <!-- Diagnostics -->
  <div class="card">
    <div class="card-title">Diagnostyka</div>
    <div class="card-body">
      <div class="diag-grid" id="diagGrid">
        <div class="diag-item"><div class="label">Status sesji</div><div class="value loading" id="d-session">---</div></div>
        <div class="diag-item"><div class="label">Stan klienta</div><div class="value loading" id="d-state">---</div></div>
        <div class="diag-item"><div class="label">Numer</div><div class="value loading" id="d-number">---</div></div>
        <div class="diag-item"><div class="label">Platforma</div><div class="value loading" id="d-platform">---</div></div>
        <div class="diag-item"><div class="label">WhatsApp Web</div><div class="value loading" id="d-version">---</div></div>
        <div class="diag-item"><div class="label">Push name</div><div class="value loading" id="d-pushname">---</div></div>
      </div>
      <div class="actions" style="margin-top:14px">
        <button class="btn-ghost" onclick="refreshDiag()">Odswiez</button>
        <button class="btn-ghost" onclick="showQr()">Pokaz QR</button>
        <button class="btn-ghost btn-red" style="border-color:#ef444444" onclick="restartSession()">Restart sesji</button>
      </div>
    </div>
  </div>

  <!-- Contacts -->
  <div class="card">
    <div class="card-title">Grupy</div>
    <div class="card-body">
      <input type="search" class="contacts-search" id="contactSearch" placeholder="Szukaj grupy..." oninput="filterContacts()">
      <div class="contacts-list" id="contactsList">
        <div style="color:var(--text-dim);font-size:13px;padding:12px">Ladowanie kontaktow...</div>
      </div>
    </div>
  </div>

  <!-- Terminal -->
  <div class="card">
    <div class="card-title" style="display:flex;align-items:center;justify-content:space-between">
      Terminal
      <div style="display:flex;gap:6px">
        <button class="btn-ghost" style="padding:4px 10px;font-size:12px" onclick="termRun('healthz')">healthz</button>
        <button class="btn-ghost" style="padding:4px 10px;font-size:12px" onclick="termRun('sessions')">sesje</button>
        <button class="btn-ghost" style="padding:4px 10px;font-size:12px" onclick="termRun('ping')">ping</button>
        <button class="btn-ghost" style="padding:4px 10px;font-size:12px" onclick="termClear()">wyczysc</button>
      </div>
    </div>
    <div class="card-body" style="padding:0">
      <div class="term" id="term"><span class="term-dim">Kliknij przycisk lub wpisz komende...</span></div>
      <div class="term-input-wrap">
        <span class="term-prompt">$</span>
        <input type="text" class="term-input" id="termInput" placeholder="GET /session/status/571603685" onkeydown="if(event.key==='Enter')termExec()">
      </div>
    </div>
  </div>
</div>

<!-- Messages sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span>Ostatnie wiadomosci</span>
    <button class="btn-ghost" style="padding:4px 8px;font-size:12px" onclick="loadMessages()">Odswiez</button>
  </div>
  <div class="messages-list" id="messagesList">
    <div style="color:var(--text-dim);font-size:13px;padding:12px">Wlacz panel aby zaladowac...</div>
  </div>
</aside>
</div>

<script>
const API = '/api';
let currentSession = '';
let allContacts = [];

async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, opts);
  const data = await res.json().catch(() => null);
  if (!res.ok) throw new Error(data?.message || data?.error || `HTTP ${res.status}`);
  return data;
}

async function loadSessions() {
  try {
    const res = await fetch('/sessions.json');
    const sessions = await res.json();
    const select = document.getElementById('sessionSelect');
    select.innerHTML = '';
    for (const s of sessions) {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      select.appendChild(opt);
    }
    currentSession = localStorage.getItem('wa-session') || sessions[0] || '';
    if (sessions.includes(currentSession)) {
      select.value = currentSession;
    } else {
      currentSession = sessions[0] || '';
    }
  } catch {
    currentSession = 'HomeAssistant';
    const select = document.getElementById('sessionSelect');
    select.innerHTML = '<option value="HomeAssistant">HomeAssistant</option>';
  }
  refreshAll();
}

function switchSession() {
  currentSession = document.getElementById('sessionSelect').value;
  localStorage.setItem('wa-session', currentSession);
  refreshAll();
}

function refreshAll() {
  refreshDiag();
  loadContacts();
}

function setDiag(id, value, isError) {
  const el = document.getElementById(id);
  el.textContent = value || '---';
  el.className = 'value' + (isError ? '' : '');
  if (!value) el.classList.add('loading');
}

function showSendStatus(msg, ok) {
  const el = document.getElementById('sendStatus');
  el.textContent = msg;
  el.className = 'status-msg ' + (ok ? 'ok' : 'err');
  if (ok) setTimeout(() => { el.className = 'status-msg'; }, 5000);
}

function cleanPhone(raw) {
  const digits = raw.replace(/[^0-9+]/g, '');
  if (digits.startsWith('+')) return digits.slice(1);
  if (digits.startsWith('48') && digits.length >= 11) return digits;
  if (digits.length === 9) return '48' + digits;
  return digits;
}

async function sendMessage() {
  const phone = document.getElementById('phone').value.trim();
  const msg = document.getElementById('msg').value.trim();
  if (!phone || !msg) return showSendStatus('Wypelnij numer i tresc', false);

  const chatId = phone.includes('@') ? phone : cleanPhone(phone) + '@c.us';
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = 'Wysylanie...';

  try {
    await api(`/client/sendMessage/${currentSession}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatId, contentType: 'string', content: msg })
    });
    showSendStatus('Wiadomosc wyslana (' + currentSession + ')', true);
    document.getElementById('msg').value = '';
  } catch (e) {
    showSendStatus('Blad: ' + e.message, false);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Wyslij';
  }
}

async function refreshDiag() {
  const dot = document.getElementById('statusDot');

  try {
    const s = await api(`/session/status/${currentSession}`);
    setDiag('d-session', s.success !== false ? (s.state || s.status || 'OK') : 'Error');
  } catch { setDiag('d-session', 'Niedostepny', true); }

  try {
    const s = await api(`/client/getState/${currentSession}`);
    const state = s.state || s.data || JSON.stringify(s);
    setDiag('d-state', typeof state === 'string' ? state : JSON.stringify(state));
    dot.className = 'dot' + (state === 'CONNECTED' || state === true ? ' ok' : ' err');
  } catch {
    setDiag('d-state', 'Niedostepny', true);
    dot.className = 'dot err';
  }

  try {
    const info = await api(`/client/getClassInfo/${currentSession}`);
    const d = info.sessionInfo || info.data || info;
    setDiag('d-number', d.wid?.user || d.me?.user || '---');
    setDiag('d-platform', d.platform || '---');
    setDiag('d-pushname', d.pushname || '---');
  } catch {
    setDiag('d-number', '---');
    setDiag('d-platform', '---');
    setDiag('d-pushname', '---');
  }

  try {
    const v = await api(`/client/getWWebVersion/${currentSession}`);
    setDiag('d-version', v.result || v.version || v.data || '---');
  } catch { setDiag('d-version', '---'); }
}

async function restartSession() {
  if (!confirm('Restartowac sesje ' + currentSession + '?')) return;
  try {
    await api(`/session/restart/${currentSession}`);
    showSendStatus('Sesja restartowana — poczekaj chwile', true);
    setTimeout(refreshDiag, 5000);
  } catch (e) {
    showSendStatus('Blad restartu: ' + e.message, false);
  }
}

function showQr() {
  const overlay = document.createElement('div');
  overlay.className = 'qr-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="qr-box">
    <p>Zeskanuj QR kodem w WhatsApp<br>(Ustawienia → Polaczone urzadzenia)</p>
    <img src="${API}/session/qr/${currentSession}/image" alt="QR Code" onerror="this.alt='QR niedostepny — sesja moze byc juz polaczona'">
    <br><button class="btn btn-ghost" onclick="this.closest('.qr-overlay').remove()">Zamknij</button>
  </div>`;
  document.body.appendChild(overlay);
}

async function loadContacts() {
  try {
    const res = await api(`/client/getContacts/${currentSession}`);
    const raw = res.data || res.contacts || res;
    if (!Array.isArray(raw)) { allContacts = []; return; }

    allContacts = raw
      .filter(c => c.isGroup)
      .map(c => ({
        name: c.name || c.id?.user || '?',
        number: '',
        chatId: c.id?._serialized || '',
        isGroup: true
      }))
      .sort((a, b) => a.name.localeCompare(b.name, 'pl'));
    renderContacts(allContacts);
  } catch {
    document.getElementById('contactsList').innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:12px">Nie udalo sie zaladowac kontaktow</div>';
  }
}

function renderContacts(list) {
  const el = document.getElementById('contactsList');
  if (!list.length) { el.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:12px">Brak grup</div>'; return; }
  el.innerHTML = list.map(c =>
    `<div class="contact-item" onclick="pickContact('${esc(c.chatId)}','',true)"><span class="name">${esc(c.name)}</span></div>`
  ).join('');
}

function pickContact(chatId, number, isGroup) {
  const field = document.getElementById('phone');
  field.value = isGroup ? chatId : (number ? '+' + number : chatId);
  document.getElementById('msg').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function filterContacts() {
  const q = document.getElementById('contactSearch').value.toLowerCase();
  if (!q) return renderContacts(allContacts);
  renderContacts(allContacts.filter(c => c.name.toLowerCase().includes(q) || c.number.includes(q)));
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toggleSidebar() {
  const on = document.getElementById('sidebarToggle').checked;
  document.body.classList.toggle('sidebar-open', on);
  localStorage.setItem('wa-sidebar', on ? '1' : '0');
  if (on) loadMessages();
}

async function loadMessages() {
  const el = document.getElementById('messagesList');
  el.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:12px">Ladowanie...</div>';
  try {
    const res = await api(`/client/getChats/${currentSession}`);
    const chats = (res.data || res.chats || res.result || res);
    if (!Array.isArray(chats)) throw new Error('bad response');

    const recent = chats
      .filter(c => c.lastMessage)
      .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
      .slice(0, 50);

    if (!recent.length) {
      el.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:12px">Brak wiadomosci</div>';
      return;
    }

    el.innerHTML = recent.map(c => {
      const name = c.name || c.id?.user || '?';
      const body = c.lastMessage?.body || c.lastMessage?.type || '';
      const ts = c.timestamp ? new Date(c.timestamp * 1000) : null;
      const time = ts ? ts.toLocaleTimeString('pl', {hour:'2-digit',minute:'2-digit'}) : '';
      const date = ts ? ts.toLocaleDateString('pl', {day:'2-digit',month:'2-digit'}) : '';
      const fromMe = c.lastMessage?.fromMe;
      const dir = fromMe ? '<span class="msg-dir out">&#8594;</span>' : '<span class="msg-dir in">&#8592;</span>';
      const unread = c.unreadCount > 0 ? `<span class="msg-badge">${c.unreadCount}</span>` : '';
      return `<div class="msg-item" onclick="pickContact('${esc(c.id?._serialized || '')}','',${!!c.isGroup})">
        <div class="msg-top"><span class="msg-name">${esc(name)}</span>${unread}<span class="msg-time">${date} ${time}</span></div>
        <div class="msg-body">${dir} ${esc(body.substring(0, 120))}</div>
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div style="color:var(--red);font-size:13px;padding:12px">Blad: ${esc(e.message)}</div>`;
  }
}

// --- Terminal ---
function termLog(text, cls) {
  const term = document.getElementById('term');
  const line = document.createElement('div');
  line.className = 'term-line' + (cls ? ' ' + cls : '');
  line.textContent = text;
  term.appendChild(line);
  term.scrollTop = term.scrollHeight;
}

function termJson(obj) {
  const term = document.getElementById('term');
  const line = document.createElement('pre');
  line.className = 'term-line term-json';
  line.textContent = JSON.stringify(obj, null, 2);
  term.appendChild(line);
  term.scrollTop = term.scrollHeight;
}

function termClear() {
  document.getElementById('term').innerHTML = '';
}

async function termRun(cmd) {
  const ts = new Date().toLocaleTimeString('pl', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  termLog(`[${ts}] $ ${cmd}`, 'term-cmd');
  const t0 = performance.now();
  try {
    let data;
    if (cmd === 'healthz') {
      const raw = await api('/healthz');
      const s = (raw.sessions || []).find(s => s.sessionId === currentSession);
      data = s ? { sessionId: s.sessionId, state: s.state, connected: s.connected } : { error: 'session not found', available: (raw.sessions||[]).map(s=>s.sessionId) };
    } else if (cmd === 'sessions') {
      data = await api('/session/getSessions');
    } else if (cmd === 'ping') {
      data = await api('/ping');
    } else if (cmd === 'info') {
      data = await api(`/client/getClassInfo/${currentSession}`);
    } else if (cmd === 'version') {
      data = await api(`/client/getWWebVersion/${currentSession}`);
    } else if (cmd === 'chats') {
      const res = await api(`/client/getChats/${currentSession}`);
      const chats = res.data || res;
      data = { total: chats.length, unread: chats.filter(c => c.unreadCount > 0).length };
    } else if (cmd === 'status') {
      data = await api(`/session/status/${currentSession}`);
    } else {
      // Custom: "GET /path" or just "/path"
      let path = cmd;
      let method = 'GET';
      let body = null;
      const parts = cmd.match(/^(GET|POST)\s+(.+)/i);
      if (parts) { method = parts[1].toUpperCase(); path = parts[2]; }
      if (!path.startsWith('/')) path = '/' + path;
      // Replace {session} placeholder
      path = path.replace(/\{session\}/g, currentSession);
      const opts = { method };
      if (method === 'POST') {
        opts.headers = { 'Content-Type': 'application/json' };
        // Check if there's JSON after the path
        const jsonIdx = path.indexOf(' {');
        if (jsonIdx > 0) {
          opts.body = path.substring(jsonIdx + 1);
          path = path.substring(0, jsonIdx);
        } else {
          opts.body = '{}';
        }
      }
      data = await api(path, opts);
    }
    const ms = Math.round(performance.now() - t0);
    termLog(`OK (${ms}ms)`, 'term-ok');
    termJson(data);
  } catch (e) {
    const ms = Math.round(performance.now() - t0);
    termLog(`ERROR (${ms}ms): ${e.message}`, 'term-err');
  }
}

function termExec() {
  const input = document.getElementById('termInput');
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  termRun(cmd);
}

// Init
const savedSidebar = localStorage.getItem('wa-sidebar') === '1';
if (savedSidebar) {
  document.getElementById('sidebarToggle').checked = true;
  document.body.classList.add('sidebar-open');
}
loadSessions();
</script>
</body>
</html>
