<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#128c7e"/>
      <stop offset="100%" style="stop-color:#25d366"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c2410c"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="s" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="35" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="2">ARCHITECTURE</text>

  <!-- Docker container box -->
  <rect x="120" y="55" width="560" height="310" rx="12" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="140" y="78" font-family="monospace" font-size="11" fill="#64748b">docker compose (whatsapp-api)</text>

  <!-- wwebjs-api box -->
  <rect x="155" y="95" width="200" height="120" rx="10" fill="url(#green)" filter="url(#s)"/>
  <text x="255" y="125" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">wwebjs-api</text>
  <text x="255" y="148" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">Node.js + Chromium</text>
  <text x="255" y="168" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">:3001 /client/* /session/*</text>
  <text x="255" y="186" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">REST + WebSocket</text>
  <text x="255" y="205" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Swagger UI /api-docs</text>

  <!-- Caddy box -->
  <rect x="445" y="95" width="200" height="120" rx="10" fill="url(#blue)" filter="url(#s)"/>
  <text x="545" y="125" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">Caddy</text>
  <text x="545" y="148" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">Reverse Proxy + TLS</text>
  <text x="545" y="168" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">/api/* -> api:3001</text>
  <text x="545" y="186" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">/* -> WebUI (static)</text>
  <text x="545" y="205" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">basicauth + HTTPS</text>

  <!-- Arrow Caddy -> API -->
  <line x1="445" y1="155" x2="365" y2="155" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker></defs>

  <!-- WebUI box -->
  <rect x="445" y="245" width="200" height="80" rx="10" fill="url(#purple)" filter="url(#s)"/>
  <text x="545" y="275" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">WebUI</text>
  <text x="545" y="298" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">HTML + CSS (Nord theme)</text>
  <text x="545" y="315" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">messages, QR, diagnostics</text>

  <!-- Arrow WebUI -> Caddy -->
  <line x1="545" y1="245" x2="545" y2="220" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- WhatsApp Cloud -->
  <rect x="155" y="260" width="200" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#s)"/>
  <text x="255" y="288" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#25d366" text-anchor="middle">WhatsApp Web</text>
  <text x="255" y="308" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">web.whatsapp.com (Puppeteer)</text>

  <!-- Arrow API -> WhatsApp -->
  <line x1="255" y1="215" x2="255" y2="260" stroke="#25d366" stroke-width="2" marker-end="url(#arrowgreen)"/>
  <defs><marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#25d366"/></marker></defs>

  <!-- HA Integration box (outside docker) -->
  <rect x="30" y="380" width="330" height="30" rx="8" fill="url(#orange)" filter="url(#s)"/>
  <text x="195" y="400" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Home Assistant custom component (wapi)</text>

  <!-- Arrow HA -> API -->
  <path d="M 195 380 L 195 340 L 120 340 L 120 155 L 155 155" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arroworange)"/>
  <defs><marker id="arroworange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker></defs>

  <!-- HA entities label -->
  <text x="448" y="400" font-family="monospace" font-size="10" fill="#64748b">notify | sensor | binary_sensor | button</text>
</svg>
