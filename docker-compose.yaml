# WhatsApp Web API (wwebjs) with Caddy reverse proxy

name: whatsapp-api

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: wwebjs-api-patched:latest
    container_name: wwebjs-web-api
    restart: unless-stopped
    labels:
      nas.ops: "true"
      nas.ops.check_script: "whatsapp"
      nas.ops.repair: "whatsapp"
      nas.ops.check: "http_node"
      nas.ops.check_args: "3001|/ping"
      nas.ha.id: "whatsapp"
      nas.ha.name: "WhatsApp"
      nas.ha.icon: "mdi:whatsapp"
    env_file: .env
    volumes:
      - ./sessions:/usr/src/app/sessions
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3001/ping',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: whatsapp-caddy
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./webui:/srv/webui:ro
      - ${SSL_CERT_DIR}/fullchain.pem:/certs/fullchain.pem:ro
      - ${SSL_CERT_DIR}/key.pem:/certs/key.pem:ro
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      internal:
      qnetwork:
        mac_address: "${CADDY_MAC}"
    depends_on:
      - api

networks:
  internal:
    driver: bridge
  qnetwork:
    external: true
    name: ${EXT_NETWORK}
