# WhatsApp Web API (wwebjs) with Caddy reverse proxy
# Deployment: /share/Container/whatsapp-webjs/

name: whatsapp-api

services:
  api:
    image: avoylenko/wwebjs-api:latest
    container_name: wwebjs-web-api
    restart: always
    env_file: .env
    volumes:
      - ./sessions:/usr/src/app/sessions
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3001/ping',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: whatsapp-caddy
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /share/Maintenance/key-management/ssl/fullchain.pem:/certs/fullchain.pem:ro
      - /share/Maintenance/key-management/ssl/key.pem:/certs/key.pem:ro
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      internal:
      qnetwork:
        mac_address: "02:42:1e:7c:13:03"
    depends_on:
      - api

networks:
  internal:
    driver: bridge
  qnetwork:
    external: true
    name: qnet-dhcp-eth0-6d6da6
